name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Run `hnt`
        2. Navigate to ...
        3. Press ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: HNT version
      description: Output of `hnt --version` or the release you downloaded
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS and terminal
      description: e.g. macOS 15.3 + iTerm2, Ubuntu 24.04 + Alacritty
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Logs, screenshots, or anything else that might help
    validations:
      required: false
